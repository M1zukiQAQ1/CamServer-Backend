<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Seeing Monitor</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin: 0; padding: 0; background:#0b1020; color:#e8eef8; }
    .wrap { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; padding: 16px; }
    .panel { background:#131a33; border-radius:12px; padding:16px; box-shadow: 0 4px 16px rgba(0,0,0,.3); }
    .title { font-size: 20px; margin-bottom: 8px; }
    .kv { display:flex; justify-content:space-between; margin:8px 0; }
    label { display:block; margin-top:8px; }
    input[type=number] { width: 100%; padding:8px; border-radius:8px; border:1px solid #29325a; background:#0f1530; color:#e8eef8; }
    button { margin-top:12px; padding:10px 14px; border:none; border-radius:10px; background:#2d6cff; color:white; cursor:pointer; }
    img { width:100%; height:auto; border-radius:12px; background:#000; }
    .ok { color:#7CFC90; }
    .error { color:#ff6b6b; font-size: 14px; margin-top: 4px; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <div class="title">Live Stream</div>
    <img id="stream" src="/seeing_monitor" alt="stream">
    <div class="info"><span id="pos">--</span></div>
  </div>
  <div class="panel">
    <div class="title">Controls & Stats</div>
    <div class="kv"><span>Latency</span><strong><span id="latency">--</span> ms</strong></div>
    <form id="settingsForm">
      <label>Exposure (µs)
        <input id="exposure" name="exposure" type="number" min="100" max="10000000" step="1" required />
      </label>
      <label>Gain
        <input id="gain" name="gain" type="number" min="1" max="100" step="1" required />
      </label>
      <button type="submit">Apply</button>
      <button id="downloadBtn" type="button">Download Polaris Data</button>
      <div id="status"></div>
      <div id="error" class="error"></div>
    </form>
  </div>
</div>

<script>
  let prefillsDone = false;

  document.getElementById("downloadBtn").addEventListener("click", () => {
    const url = "https://camserver.physics.ucsb.edu/api/images/PolarisData.csv";

    const a = document.createElement("a");
    a.href = url;
    a.download = "PolarisData.csv";  // suggested filename
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });

  async function loadSettings() {
    try {
      const r = await fetch('/settings');
      const j = await r.json();
      document.getElementById('exposure').value = j.exposure ?? '';
      document.getElementById('gain').value = j.gain ?? '';
    } catch(e) {}
  }

  async function pollStats() {
    try {
      const r = await fetch('/stats');
      const j = await r.json();
      const ms = j.meta && (j.meta.latency_ms ?? j.meta.latencyMs);
      document.getElementById('latency').textContent = (ms === null || ms === undefined) ? '--' : ms;

      if (!prefillsDone && j.settings) {
        document.getElementById('exposure').value = j.settings.exposure ?? '';
        document.getElementById('gain').value = j.settings.gain ?? '';
        prefillsDone = true;
      }
    } catch(e) {}
  }

  async function getPos() {
    try {
      const res = await fetch('/live_pos');
      const posTxt = await res.text();     // <-- extract the string body
      console.log("pos:", posTxt);
      document.getElementById("pos").textContent = posTxt;
    } catch (e) {}
  }

  document.getElementById('settingsForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const exposure = parseInt(document.getElementById('exposure').value);
    const gain = parseInt(document.getElementById('gain').value);
    const err = document.getElementById('error');
    err.textContent = ''; // clear old error

    // Validate values
    if (isNaN(exposure) || exposure < 100 || exposure > 10000000) {
      err.textContent = 'Exposure must be an integer between 100 and 10,000,000.';
      return;
    }
    if (isNaN(gain) || gain < 1 || gain > 100) {
      err.textContent = 'Gain must be an integer between 1 and 100.';
      return;
    }

    // Submit form data
    const fd = new FormData();
    fd.append('exposure', exposure);
    fd.append('gain', gain);

    const r = await fetch('/settings', { method: 'POST', body: fd });
    const j = await r.json();
    document.getElementById('status').innerHTML = j.ok ? '<span class="ok">Saved.</span>' : 'Error';
    setTimeout(()=> document.getElementById('status').textContent='', 1500);
  });

  loadSettings();
  pollStats();
  setInterval(pollStats, 1000);
  setInterval(getPos, 1000)
</script>
</body>
</html>
